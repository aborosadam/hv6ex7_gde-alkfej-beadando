apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: movies
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/aborosadam/movies-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: MongoDbSettings__ConnectionString
              value: "mongodb://admin:admin123@mongodb:27017/?authSource=admin"
            - name: MongoDbSettings__DatabaseName
              value: "moviesdb"
            - name: MongoDbSettings__MoviesCollectionName
              value: "movies"
            - name: MongoDbSettings__ReviewsCollectionName
              value: "reviews"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: movies
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP